<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Notenrechner</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    :root {
      --bg:      #0d0d14;
      --surface: #13131f;
      --card:    #1a1a2e;
      --border:  rgba(255,255,255,.08);
      --border2: rgba(255,255,255,.13);
      --text:    #e2e8f0;
      --muted:   #475569;
      --muted2:  #64748b;
      --accent:  #6366f1;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Inter',system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      font-size:14px;
    }

    /* ambient glow */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 5%,  rgba(99,102,241,.12) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 95%, rgba(139,92,246,.1)  0%,transparent 60%);
    }

    /* ── WRAPPER ── */
    .wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:1.25rem 1rem 4rem}

    /* ── TOPBAR ── */
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;gap:.5rem}
    .topbar h1{
      font-size:1.25rem;font-weight:900;letter-spacing:-.3px;
      background:linear-gradient(110deg,#c7d2fe,#a5b4fc,#c4b5fd);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .back-btn{
      font-size:.75rem;font-weight:600;color:#64748b;text-decoration:none;
      border:1px solid var(--border2);border-radius:999px;
      padding:.3rem .85rem;background:rgba(255,255,255,.03);
      transition:all .15s;
    }
    .back-btn:hover{background:rgba(255,255,255,.08);color:#94a3b8}

    /* ── STATS BAR ── */
    .stats{
      display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem;
      margin-bottom:1rem;
    }
    .st{
      background:var(--card);border:1px solid var(--border);border-radius:10px;
      padding:.6rem .75rem;text-align:center;
    }
    .st-v{font-size:1.35rem;font-weight:900;letter-spacing:-.5px;line-height:1}
    .st-l{font-size:.62rem;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;margin-top:.2rem}
    .st-pill{
      display:inline-block;font-size:.6rem;font-weight:700;padding:.1rem .45rem;
      border-radius:999px;margin-top:.25rem;color:white;
    }

    /* ── EINGABE ── */
    .form-card{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      padding:.85rem 1rem;margin-bottom:1rem;
    }
    .form-row{display:flex;flex-wrap:wrap;gap:.45rem;align-items:flex-end}
    .fg{display:flex;flex-direction:column;gap:.2rem}
    .fg label{font-size:.63rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px}
    .fg input,.fg select{
      background:rgba(255,255,255,.04);border:1px solid var(--border2);
      border-radius:7px;padding:.4rem .65rem;
      font-size:.85rem;color:var(--text);font-family:inherit;outline:none;
      transition:border-color .15s,background .15s;
    }
    .fg input::placeholder{color:var(--muted)}
    .fg input:focus,.fg select:focus{border-color:var(--accent);background:rgba(99,102,241,.07)}
    .fg select option{background:#1e1e35;color:var(--text)}
    #inp-fach{width:160px}
    #inp-note{width:68px}
    #inp-typ {width:120px}
    #inp-gew {width:110px}
    .btn-add{
      background:linear-gradient(135deg,var(--accent),#8b5cf6);
      color:white;border:none;border-radius:7px;
      padding:.42rem 1.1rem;font-size:.85rem;font-weight:700;
      cursor:pointer;font-family:inherit;
      box-shadow:0 3px 12px rgba(99,102,241,.3);
      transition:transform .15s,box-shadow .15s;
    }
    .btn-add:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(99,102,241,.45)}
    .btn-add:active{transform:none}
    .err{font-size:.72rem;color:#f87171;font-weight:600;margin-top:.3rem;min-height:.9em}

    /* ── FACH-TABELLE ── */
    .fach-table{
      background:var(--card);border:1px solid var(--border);border-radius:12px;
      overflow:hidden;
    }
    .fach-table-head{
      display:grid;grid-template-columns:160px 1fr 90px 60px;
      padding:.5rem 1rem;
      border-bottom:1px solid var(--border);
      font-size:.62rem;font-weight:700;color:var(--muted);
      text-transform:uppercase;letter-spacing:.5px;
    }
    .fach-row{
      display:grid;grid-template-columns:160px 1fr 90px 60px;
      align-items:center;
      padding:.6rem 1rem;
      border-bottom:1px solid rgba(255,255,255,.04);
      transition:background .12s;
      gap:.5rem;
    }
    .fach-row:last-child{border-bottom:none}
    .fach-row:hover{background:rgba(255,255,255,.02)}

    /* fach name col */
    .col-name{display:flex;align-items:center;gap:.55rem;min-width:0}
    .avg-dot{
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.72rem;font-weight:900;color:white;flex-shrink:0;
    }
    .fach-n{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fach-cnt{font-size:.65rem;color:var(--muted2);margin-top:.05rem}

    /* noten chips col */
    .col-chips{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
    .chip{
      display:inline-flex;align-items:center;gap:.25rem;
      padding:.18rem .5rem;border-radius:999px;
      font-size:.72rem;font-weight:700;
      transition:transform .1s;
    }
    .chip:hover{transform:scale(1.05)}
    .chip-txt{opacity:.75;font-size:.65rem;font-weight:500}
    .chip-x{
      background:rgba(0,0,0,.25);border:none;color:rgba(255,255,255,.7);
      border-radius:50%;width:13px;height:13px;
      cursor:pointer;font-size:.55rem;
      display:flex;align-items:center;justify-content:center;
      transition:background .12s;flex-shrink:0;
    }
    .chip-x:hover{background:rgba(0,0,0,.5)}

    /* avg col */
    .col-avg{text-align:center}
    .avg-val{font-size:1rem;font-weight:900;letter-spacing:-.3px}
    .avg-bew{font-size:.6rem;color:var(--muted2);margin-top:.1rem;font-weight:500}

    /* action col */
    .col-act{display:flex;justify-content:flex-end}
    .btn-del{
      background:rgba(239,68,68,.1);color:#f87171;
      border:1px solid rgba(239,68,68,.2);border-radius:6px;
      padding:.22rem .5rem;font-size:.7rem;font-weight:700;
      cursor:pointer;font-family:inherit;transition:all .12s;
    }
    .btn-del:hover{background:rgba(239,68,68,.22)}

    /* ── GESAMT ROW ── */
    .gesamt-row{
      display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;
      background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(139,92,246,.08));
      border:1px solid rgba(99,102,241,.25);border-radius:12px;
      padding:.8rem 1rem;margin-top:.75rem;
    }
    .g-left{display:flex;align-items:center;gap:.75rem}
    .g-circle{
      width:46px;height:46px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.95rem;font-weight:900;color:white;flex-shrink:0;
    }
    .g-title{font-size:.88rem;font-weight:800;color:#e2e8f0}
    .g-sub  {font-size:.7rem;color:var(--muted2);margin-top:.1rem}
    .g-tag  {
      font-size:.82rem;font-weight:800;padding:.3rem .9rem;
      border-radius:8px;color:white;
    }

    /* ── BOTTOM ACTIONS ── */
    .bottom{display:flex;justify-content:flex-end;margin-top:.6rem}
    .btn-reset{
      background:transparent;border:1px solid rgba(239,68,68,.2);
      color:#64748b;border-radius:7px;padding:.3rem .8rem;
      font-size:.72rem;font-weight:600;cursor:pointer;font-family:inherit;
      transition:all .15s;
    }
    .btn-reset:hover{background:rgba(239,68,68,.08);color:#f87171}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
    .empty-icon{font-size:2.5rem;margin-bottom:.5rem}
    .empty p{font-size:.85rem}

    @media(max-width:580px){
      .stats{grid-template-columns:repeat(3,1fr)}
      .fach-table-head,.fach-row{grid-template-columns:1fr auto 70px 50px}
      #inp-fach{width:100%}
      .st:nth-child(4),.st:nth-child(5){display:none}
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- TOPBAR -->
  <div class="topbar">
    <h1>📊 Notenrechner</h1>
    <a href="lernzettel.html" class="back-btn">← Lernzettel</a>
  </div>

  <!-- STATS -->
  <div class="stats" id="stats" style="display:none">
    <div class="st">
      <div class="st-v" id="s-avg">–</div>
      <div class="st-l">Ø Gesamt</div>
      <div class="st-pill" id="s-avg-pill" style="display:none"></div>
    </div>
    <div class="st">
      <div class="st-v" style="color:#67e8f9" id="s-fach">0</div>
      <div class="st-l">Fächer</div>
    </div>
    <div class="st">
      <div class="st-v" style="color:#c4b5fd" id="s-anz">0</div>
      <div class="st-l">Noten</div>
    </div>
    <div class="st">
      <div class="st-v" style="color:#4ade80" id="s-best">–</div>
      <div class="st-l">Beste</div>
    </div>
    <div class="st">
      <div class="st-v" style="color:#fb923c" id="s-worst">–</div>
      <div class="st-l">Schlechteste</div>
    </div>
  </div>

  <!-- EINGABE -->
  <div class="form-card">
    <div class="form-row">
      <div class="fg">
        <label>Fach</label>
        <input id="inp-fach" type="text" placeholder="z.B. Mathematik" list="dl" autocomplete="off"/>
        <datalist id="dl"></datalist>
      </div>
      <div class="fg">
        <label>Note (1–6)</label>
        <input id="inp-note" type="number" min="1" max="6" step="0.5" placeholder="2"/>
      </div>
      <div class="fg">
        <label>Typ</label>
        <select id="inp-typ">
          <option>Schriftlich</option><option>Mündlich</option>
          <option>Klausur</option><option>Praktisch</option>
          <option>Projekt</option><option>Hausaufgabe</option>
        </select>
      </div>
      <div class="fg">
        <label>Gewichtung</label>
        <select id="inp-gew">
          <option value="1">× 1  Normal</option>
          <option value="2">× 2  Doppelt</option>
          <option value="3">× 3  Dreifach</option>
          <option value="0.5">× 0.5  Halb</option>
        </select>
      </div>
      <button class="btn-add" onclick="add()">＋ Hinzufügen</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <!-- FÄCHER -->
  <div id="faecher"></div>

  <!-- GESAMT + RESET -->
  <div id="g-wrap" style="display:none">
    <div class="gesamt-row">
      <div class="g-left">
        <div class="g-circle" id="g-circle">–</div>
        <div>
          <div class="g-title">Gesamtdurchschnitt</div>
          <div class="g-sub" id="g-sub">Ø aller Fächer</div>
        </div>
      </div>
      <div class="g-tag" id="g-tag"></div>
    </div>
    <div class="bottom">
      <button class="btn-reset" onclick="clearAll()">🗑️ Alle löschen</button>
    </div>
  </div>

</div>
<script>
  // ── colour helpers ─────────────────────────────
  const C = n=>{
    if(n<=1.5)return'#22c55e';if(n<=2.5)return'#84cc16';
    if(n<=3.5)return'#eab308';if(n<=4.5)return'#f97316';
    if(n<=5.5)return'#ef4444';return'#991b1b';
  };
  const B = n=>{
    if(n<=1.5)return'Sehr gut';if(n<=2.5)return'Gut';
    if(n<=3.5)return'Befriedigend';if(n<=4.5)return'Ausreichend';
    if(n<=5.5)return'Mangelhaft';return'Ungenügend';
  };
  const avg = a=>{
    if(!a.length)return null;
    let s=0,g=0;a.forEach(n=>{s+=n.note*n.gew;g+=n.gew});return s/g;
  };
  const fmt = n=>n!==null?n.toFixed(2):'–';
  const esc = s=>s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

  // ── state (same key → data preserved) ─────────
  let D = JSON.parse(localStorage.getItem('nrv4')||'{}');
  const save=()=>localStorage.setItem('nrv4',JSON.stringify(D));

  // ── actions ────────────────────────────────────
  function add(){
    const fach=document.getElementById('inp-fach').value.trim();
    const note=parseFloat(document.getElementById('inp-note').value);
    const typ =document.getElementById('inp-typ').value;
    const gew =parseFloat(document.getElementById('inp-gew').value);
    const err =document.getElementById('err');
    if(!fach)                        {err.textContent='⚠ Fach eingeben.';return}
    if(isNaN(note)||note<1||note>6)  {err.textContent='⚠ Note 1–6 eingeben.';return}
    err.textContent='';
    if(!D[fach])D[fach]=[];
    D[fach].push({note,typ,gew});
    save();
    document.getElementById('inp-note').value='';
    render();
  }
  document.addEventListener('keydown',e=>{if(e.key==='Enter')add()});

  function delNote(f,i){D[f].splice(i,1);if(!D[f].length)delete D[f];save();render()}
  function delFach(f){delete D[f];save();render()}
  function clearAll(){if(!confirm('Alle Daten löschen?'))return;D={};save();render()}

  // ── render ─────────────────────────────────────
  function render(){
    const out   = document.getElementById('faecher');
    const gWrap = document.getElementById('g-wrap');
    const stats = document.getElementById('stats');
    const dl    = document.getElementById('dl');
    const keys  = Object.keys(D);

    dl.innerHTML=keys.map(f=>`<option value="${f}">`).join('');

    if(!keys.length){
      out.innerHTML=`<div class="fach-table"><div class="empty"><div class="empty-icon">🎓</div><p>Noch keine Noten.<br>Füge oben ein Fach hinzu!</p></div></div>`;
      gWrap.style.display='none';stats.style.display='none';return;
    }
    stats.style.display='grid';gWrap.style.display='block';

    // stats
    let avgs=[],all=[];
    keys.forEach(f=>{const a=avg(D[f]);if(a!==null)avgs.push(a);D[f].forEach(n=>all.push(n.note))});
    const gAvg =avgs.length?avgs.reduce((a,b)=>a+b)/avgs.length:null;
    const best =all.length?Math.min(...all):null;
    const worst=all.length?Math.max(...all):null;

    document.getElementById('s-avg').textContent   =fmt(gAvg);
    document.getElementById('s-avg').style.color   =gAvg?C(gAvg):'#a5b4fc';
    document.getElementById('s-fach').textContent  =keys.length;
    document.getElementById('s-anz').textContent   =all.length;
    document.getElementById('s-best').textContent  =best??'–';
    document.getElementById('s-worst').textContent =worst??'–';
    const pill=document.getElementById('s-avg-pill');
    if(gAvg){pill.style.display='inline-block';pill.style.background=C(gAvg);pill.textContent=B(gAvg)}
    else pill.style.display='none';

    // gesamt card
    const gc=document.getElementById('g-circle');
    gc.textContent=fmt(gAvg);
    gc.style.background=gAvg?C(gAvg):'#334155';
    gc.style.boxShadow=gAvg?`0 0 20px ${C(gAvg)}55`:'none';
    const gt=document.getElementById('g-tag');
    gt.textContent=gAvg?'✦ '+B(gAvg):'';
    gt.style.background=gAvg?C(gAvg)+'22':'transparent';
    gt.style.color=gAvg?C(gAvg):'white';
    gt.style.border=gAvg?`1px solid ${C(gAvg)}44`:'none';

    // fach table
    const rows=keys.map(fach=>{
      const noten=D[fach],a=avg(noten),col=C(a??3);
      const chips=noten.map((n,i)=>`
        <span class="chip" style="background:${C(n.note)}18;border:1px solid ${C(n.note)}45;color:${C(n.note)}">
          <b>${n.note}</b>
          <span class="chip-txt">${n.typ}${n.gew!==1?' ×'+n.gew:''}</span>
          <button class="chip-x" onclick="delNote('${esc(fach)}',${i})">✕</button>
        </span>`).join('');

      return`
        <div class="fach-row">
          <div class="col-name">
            <div class="avg-dot" style="background:${col}22;border:1.5px solid ${col}55;color:${col};box-shadow:0 0 10px ${col}33">${fmt(a)}</div>
            <div><div class="fach-n">${fach}</div><div class="fach-cnt">${noten.length} Note${noten.length!==1?'n':''}</div></div>
          </div>
          <div class="col-chips">${chips}</div>
          <div class="col-avg">
            <div class="avg-val" style="color:${col}">${fmt(a)}</div>
            <div class="avg-bew">${a!==null?B(a):''}</div>
          </div>
          <div class="col-act">
            <button class="btn-del" onclick="delFach('${esc(fach)}')">✕</button>
          </div>
        </div>`;
    }).join('');

    out.innerHTML=`
      <div class="fach-table">
        <div class="fach-table-head">
          <span>Fach</span><span>Noten</span><span style="text-align:center">Ø</span><span></span>
        </div>
        ${rows}
      </div>`;
  }

  render();
</script>
</body>
</html>
